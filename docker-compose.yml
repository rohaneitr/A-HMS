version: '3.8'

services:
  db:
    image: mariadb:10.6
    container_name: hms-db
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: rootpassword
      MARIADB_DATABASE: hmssaas
    ports:
      - "${DB_PORT_BINDING:-3306:3306}"
    volumes:
      - db_data:/var/lib/mysql
      # Mount sql dumps to initialize the database (alphabetical order)
      - ./Database/database_tables.sql:/docker-entrypoint-initdb.d/00_database_tables.sql
      - ./Database/01_ci_sessions.sql:/docker-entrypoint-initdb.d/01_ci_sessions.sql

  web:
    build: .
    container_name: hms-web
    restart: always
    ports:
      - "${WEB_PORT_BINDING:-8080:80}"

    environment:
      CI_ENV: production
      DB_HOST: db
      DB_NAME: hmssaas
      DB_USER: root
      DB_PASS: rootpassword
    depends_on:
      - db

volumes:
  db_data:
