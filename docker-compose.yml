version: '3.8'

services:
  db:
    image: mariadb:10.6
    container_name: hms-db
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: rootpassword
      MARIADB_DATABASE: hmssaas
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      # Mount sql dump to initialize the database
      - ./Database/database_tables.sql:/docker-entrypoint-initdb.d/init.sql

  web:
    build: .
    container_name: hms-web
    restart: always
    ports:
      - "8080:80"
    volumes:
      # Mount the extracted PHP code to Apache root
      - ./Multi-Hospital:/var/www/html
    depends_on:
      - db

volumes:
  db_data:
